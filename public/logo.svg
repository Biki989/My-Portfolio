<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <style>
    .bg { fill: #111111; }
    .text { fill: #FFFFFF; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .text { fill: #111111; }
    }
    .z-breathe {
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
  </style>
  <rect width="180" height="180" rx="40" class="bg" />
  <g class="z-breathe">
    <text x="90" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="120" text-anchor="middle" class="text">B</text>
  </g>
</svg>
