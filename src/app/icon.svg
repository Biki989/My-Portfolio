<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #111111; }
      .text { fill: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
